# Android native libraries must be linked against the API-21 sysroot, matching the
# SDK's minSdkVersion (sdks/js/packages/spark-sdk/android/build.gradle). Do not raise
# this to a newer API level. On API 30+ sysroots, bionic's libc.so exports the C++
# unwinder (_Unwind_*) under the LIBC_R symbol version, and the linker binds the
# unwinder references (pulled in by uniffi's catch_unwind) to those versioned libc
# symbols. The resulting .so fails to dlopen on Android 10 (API 29) and below, where
# LIBC_R does not exist. Linking against API 21 forces the unwinder to resolve from
# the NDK's static libunwind instead, so the library loads on every supported device.
[target.aarch64-linux-android]
linker = "aarch64-linux-android21-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi21-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.i686-linux-android]
linker = "i686-linux-android21-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.x86_64-linux-android]
linker = "x86_64-linux-android21-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.wasm32-unknown-unknown]
# Increase the stack size to 3MB (default is ~1MB). In WASM, stack/heap can overlap without a guard
# page, which can manifest as flaky runtime traps/panics on some environments.
rustflags = ["-C", "link-arg=-zstack-size=3000000"]
